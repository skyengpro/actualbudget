{{- if .Values.managedCertificate.enabled }}
apiVersion: networking.gke.io/v1
kind: ManagedCertificate
metadata:
  name: {{ .Values.managedCertificate.name }}
  labels:
    {{- include "sky-budget.labels" . | nindent 4 }}
spec:
  domains:
    {{- range .Values.managedCertificate.domains }}
    - {{ . | quote }}
    {{- end }}
{{- end }}
