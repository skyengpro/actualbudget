apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "sky-budget.fullname" . }}
  labels:
    {{- include "sky-budget.labels" . | nindent 4 }}
spec:
  replicas: {{ .Values.replicaCount }}
  selector:
    matchLabels:
      {{- include "sky-budget.selectorLabels" . | nindent 6 }}
  template:
    metadata:
      {{- with .Values.podAnnotations }}
      annotations:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      labels:
        {{- include "sky-budget.selectorLabels" . | nindent 8 }}
    spec:
      {{- with .Values.imagePullSecrets }}
      imagePullSecrets:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      serviceAccountName: {{ include "sky-budget.serviceAccountName" . }}
      securityContext:
        {{- toYaml .Values.podSecurityContext | nindent 8 }}
      containers:
        - name: {{ .Chart.Name }}
          securityContext:
            {{- toYaml .Values.securityContext | nindent 12 }}
          image: "{{ .Values.image.repository }}:{{ .Values.image.tag | default .Chart.AppVersion }}"
          imagePullPolicy: {{ .Values.image.pullPolicy }}
          ports:
            - name: http
              containerPort: 5006
              protocol: TCP
          env:
            {{- range $key, $value := .Values.env }}
            - name: {{ $key }}
              value: {{ $value | quote }}
            {{- end }}
            {{- if .Values.openid.enabled }}
            - name: ACTUAL_LOGIN_METHOD
              value: "openid"
            - name: ACTUAL_OPENID_DISCOVERY_URL
              value: {{ .Values.openid.discoveryUrl | quote }}
            - name: ACTUAL_OPENID_CLIENT_ID
              value: {{ .Values.openid.clientId | quote }}
            - name: ACTUAL_OPENID_CLIENT_SECRET
              valueFrom:
                secretKeyRef:
                  name: {{ include "sky-budget.fullname" . }}-openid
                  key: client-secret
            - name: ACTUAL_OPENID_SERVER_HOSTNAME
              value: {{ .Values.openid.serverHostname | quote }}
            - name: ACTUAL_OPENID_ENFORCE
              value: {{ .Values.openid.enforce | quote }}
            - name: ACTUAL_USER_CREATION_MODE
              value: {{ .Values.openid.userCreationMode | quote }}
            {{- with .Values.openid.allowedLoginMethods }}
            - name: ACTUAL_ALLOWED_LOGIN_METHODS
              value: {{ . | quote }}
            {{- end }}
            {{- end }}
          livenessProbe:
            httpGet:
              path: /health
              port: http
            initialDelaySeconds: 30
            periodSeconds: 10
          readinessProbe:
            httpGet:
              path: /health
              port: http
            initialDelaySeconds: 5
            periodSeconds: 5
          resources:
            {{- toYaml .Values.resources | nindent 12 }}
          volumeMounts:
            - name: data
              mountPath: /data
      volumes:
        - name: data
          {{- if .Values.persistence.enabled }}
          persistentVolumeClaim:
            claimName: {{ include "sky-budget.fullname" . }}
          {{- else }}
          emptyDir: {}
          {{- end }}
      {{- with .Values.nodeSelector }}
      nodeSelector:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.affinity }}
      affinity:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.tolerations }}
      tolerations:
        {{- toYaml . | nindent 8 }}
      {{- end }}
